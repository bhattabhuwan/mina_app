name: mina_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pedometer: ^4.1.1
  provider: ^6.1.5+1
  permission_handler: ^12.0.1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  universal_file_picker: ^0.1.0
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

# ✅ Correct placement of flutter_launcher_icons (root level)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "lib/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - lib/images/logo.png
    - lib/images/google.png
    - lib/images/profile.jpeg